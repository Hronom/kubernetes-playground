apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: n8n
spec:
  hosts:
    - n8n.localhost
  gateways:
    - istio-gateway-ingress/istio-gateway-ingress-main
  http:
    - route:
        - destination:
            host: n8n.{{ .Release.Namespace }}.svc.cluster.local
            port:
              number: 5678